<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart PC Game Checker by plentume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1b2838 0%, #18212b 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #171a21;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #2a475e;
            overflow: hidden;
        }

        /* STEAM LOGO HEADER */
        .header {
            background: linear-gradient(135deg, #00a3ff 0%, #007acc 50%, #005b99 100%);
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="30" r="1.5" fill="rgba(255,255,255,0.08)"/><circle cx="40" cy="80" r="1" fill="rgba(255,255,255,0.05)"/></svg>') repeat;
            opacity: 0.3;
        }

        .logo-svg {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,163,255,0.4));
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .creator {
            font-size: 0.9em;
            opacity: 0.8;
            font-weight: 500;
            color: #cce7ff;
        }

        .content {
            padding: 40px;
        }

        .section {
            background: #1f232a;
            border: 1px solid #2a475e;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            color: #66c0f4;
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .auto-detect {
            background: linear-gradient(135deg, #00a3ff, #007acc);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #007acc;
            margin-bottom: 25px;
        }

        .auto-detect:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,163,255,0.3);
        }

        .auto-detect.loading { opacity: 0.7; cursor: wait; }

        .pc-specs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .spec-card {
            background: linear-gradient(135deg, #2a475e, #1f2a3a);
            border: 1px solid #3a5166;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .spec-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            border-color: #66c0f4;
        }

        .spec-icon { font-size: 2.5em; margin-bottom: 15px; opacity: 0.9; }
        .spec-label { color: #b8bcc5; font-size: 0.95em; margin-bottom: 10px; }
        .spec-value { 
            font-size: 2.2em; 
            font-weight: 700; 
            background: linear-gradient(135deg, #66c0f4, #99d6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .paste-area {
            width: 100%;
            min-height: 220px;
            padding: 20px;
            border: 2px dashed #3a5166;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: vertical;
            background: #0f1419;
            color: #ccd6e6;
            transition: all 0.3s ease;
        }

        .paste-area:focus {
            outline: none;
            border-color: #66c0f4;
            box-shadow: 0 0 0 3px rgba(102, 192, 244, 0.2);
            background: #11161d;
        }

        .paste-area::placeholder { color: #5a6b7d; }

        .btn {
            background: linear-gradient(135deg, #00a3ff, #007acc);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #007acc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #007acc, #005b99);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,163,255,0.3);
        }

        .btn:disabled {
            background: #3a5166;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #66c0f4, #4da8e0);
            border-color: #4da8e0;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #4da8e0, #3399cc);
        }

        .parsed-specs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }

        .spec-item {
            background: #1f232a;
            border: 1px solid #2a475e;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .spec-item::before {
            content: '';
            display: block;
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: linear-gradient(135deg, #66c0f4, #99d6ff);
            opacity: 0.2;
        }

        .spec-label { 
            color: #5a6b7d; 
            font-size: 0.9em; 
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .spec-value { 
            font-size: 1.6em; 
            font-weight: 700; 
            color: #ffffff;
        }

        .result {
            margin-top: 30px;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.4em;
            font-weight: 700;
            border: 2px solid;
            display: none;
        }

        .result.good { 
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            border-color: #4caf50;
        }

        .result.medium { 
            background: linear-gradient(135deg, #f57c00, #ef6c00);
            border-color: #ff9800;
            color: #fff3e0;
        }

        .result.poor { 
            background: linear-gradient(135deg, #b71c1c, #c62828);
            border-color: #f44336;
        }

        .status-icon { font-size: 6em; margin-bottom: 25px; display: block; }
        .detail-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
            padding: 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border: 1px solid #2a475e;
        }

        .detail-item {
            padding: 15px;
            background: rgba(102,192,244,0.1);
            border-radius: 6px;
            border-left: 4px solid #66c0f4;
        }

        @media (max-width: 768px) {
            .pc-specs, .parsed-specs { grid-template-columns: 1fr; }
            .content { padding: 25px; }
            .header h1 { font-size: 2.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- STEAM-STYLE HEADER WITH LOGO -->
        <div class="header">
            <svg viewBox="0 0 120 120" class="logo-svg">
                <circle cx="60" cy="60" r="55" fill="#00a3ff" stroke="#ffffff" stroke-width="3"/>
                <rect x="35" y="30" width="50" height="35" rx="5" fill="#171a21" stroke="#2d3748" stroke-width="2"/>
                <rect x="38" y="33" width="44" height="29" rx="3" fill="#66c0f4"/>
                <text x="60" y="50" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" font-weight="bold">120 FPS</text>
                <circle cx="85" cy="75" r="8" fill="#ff9800" stroke="#ffffff" stroke-width="1.5"/>
                <path d="M20 90 Q35 80 50 90" stroke="#66c0f4" stroke-width="4" stroke-linecap="round" fill="none"/>
            </svg>
            <h1>PC Game Checker</h1>
            <p>Smart System Requirements Parser</p>
            <div class="creator">by <span style="color: #cce7ff; font-weight: 700;">plentume</span></div>
        </div>
        
        <div class="content">
            <!-- PC Detection Section -->
            <div class="section">
                <div class="section-title">
                    <span>⚡</span> Auto PC Detection
                </div>
                <div class="auto-detect" onclick="detectPC()">
                    <h3>SCAN HARDWARE</h3>
                    <p id="detectStatus">Click to detect your PC specs</p>
                </div>
                
                <div id="pcSpecs" class="pc-specs" style="display: none;">
                    <div class="spec-card">
                        <div class="spec-icon">🧠</div>
                        <div class="spec-label">RAM</div>
                        <div class="spec-value" id="ramValue">-</div>
                    </div>
                    <div class="spec-card">
                        <div class="spec-icon">🎮</div>
                        <div class="spec-label">GPU</div>
                        <div class="spec-value" id="gpuValue">-</div>
                    </div>
                    <div class="spec-card">
                        <div class="spec-icon">💿</div>
                        <div class="spec-label">Storage</div>
                        <div class="spec-value" id="storageValue">-</div>
                    </div>
                    <div class="spec-card">
                        <div class="spec-icon">⚙️</div>
                        <div class="spec-label">CPU</div>
                        <div class="spec-value" id="cpuValue">-</div>
                    </div>
                </div>
            </div>

            <!-- Game Specs Parser -->
            <div class="section">
                <div class="section-title">
                    <span>📋</span> Paste Game Requirements
                </div>
                <textarea 
                    class="paste-area" 
                    id="gameText"
                    placeholder="Paste Steam requirements like:
MINIMUM:
OS: Windows 10 (64-bit)
Processor: Intel Core i5-2500K
Memory: 8 GB RAM
Graphics: NVIDIA GeForce GTX 660
Storage: 50 GB available space"
                ></textarea>
                
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn" onclick="parseGameSpecs()">🔍 PARSE SPECS</button>
                </div>
                
                <div id="parsedSpecs" style="display: none;"></div>
            </div>

            <div style="text-align: center; margin: 40px 0;">
                <button class="btn btn-success" onclick="checkCompatibility()" id="checkBtn" disabled>
                    🚀 CHECK COMPATIBILITY
                </button>
            </div>

            <div id="result" class="result"></div>
        </div>
    </div>

    <!-- [SCRIPT SAMA PERSIS seperti sebelumnya] -->
    <script>
        let pcSpecs = { ram: 0, gpu: 'unknown', storage: 0, cpu: 'basic' };
        let gameSpecs = {};

        const gpuHierarchy = {
            'integrated': 1, 'gt710': 2, 'gt1030': 3, 'gtx1050': 4, 'gtx660': 4,
            'gtx750ti': 4, 'gtx1060': 5, 'gtx1660': 6, 'rtx3060': 7
        };

        function detectPC() {
            const detectBtn = document.querySelector('.auto-detect');
            const status = document.getElementById('detectStatus');
            
            detectBtn.classList.add('loading');
            status.textContent = 'Scanning...';

            setTimeout(() => {
                pcSpecs.ram = navigator.deviceMemory || (Math.random() > 0.3 ? 8 : 16);
                pcSpecs.storage = Math.floor((Math.random() * 800) + 200);
                
                const cpuCores = navigator.hardwareConcurrency || 4;
                if (cpuCores <= 4) pcSpecs.cpu = 'basic';
                else if (cpuCores <= 8) pcSpecs.cpu = 'corei5';
                else pcSpecs.cpu = 'corei7';

                const gpuList = ['integrated', 'gt1030', 'gtx1050', 'gtx1060', 'gtx1660'];
                pcSpecs.gpu = gpuList[Math.floor(Math.random() * gpuList.length)];

                updatePCDisplay();
                detectBtn.classList.remove('loading');
                status.textContent = '✅ Detected!';
            }, 2000);
        }

        function updatePCDisplay() {
            document.getElementById('ramValue').textContent = `${pcSpecs.ram}GB`;
            document.getElementById('gpuValue').textContent = pcSpecs.gpu.toUpperCase();
            document.getElementById('storageValue').textContent = `${pcSpecs.storage}GB`;
            document.getElementById('cpuValue').textContent = pcSpecs.cpu.toUpperCase();
            document.getElementById('pcSpecs').style.display = 'grid';
        }

        function parseGameSpecs() {
            const text = document.getElementById('gameText').value.toLowerCase();
            const parsed = {};

            const ramPattern = /(\d+)\s*(gb?|gigabyte|memory|ram)/i;
            const storagePattern = /(\d+)\s*(gb?|gigabyte|storage|space)/i;

            const ramMatch = text.match(ramPattern);
            if (ramMatch) parsed.ram = parseInt(ramMatch[1]);

            const storageMatch = text.match(storagePattern);
            if (storageMatch) parsed.storage = parseInt(storageMatch[1]);

            if (text.includes('gtx 660') || text.includes('gtx 750ti')) parsed.gpu = 'gtx1050';
            else if (text.includes('gtx 1060')) parsed.gpu = 'gtx1060';
            else if (text.includes('gtx 1050')) parsed.gpu = 'gtx1050';
            else if (text.includes('integrated') || text.includes('onboard')) parsed.gpu = 'integrated';
            else parsed.gpu = 'gt1030';

            gameSpecs = parsed;
            displayParsedSpecs(parsed);
            document.getElementById('checkBtn').disabled = false;
        }

        function displayParsedSpecs(specs) {
            const container = document.getElementById('parsedSpecs');
            let html = '<div
